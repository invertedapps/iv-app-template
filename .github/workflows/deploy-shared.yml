name: Deploy (Shared)
on:
  workflow_call:

jobs:
  # Determine which components changed and derive app config
  setup:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workers: ${{ steps.filter.outputs.workers }}
      app_slug: ${{ steps.derive.outputs.app_slug }}
      cloud_run_service: ${{ steps.derive.outputs.cloud_run_service }}
      app_api_url: ${{ steps.derive.outputs.app_api_url }}
      skip: ${{ steps.guard.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for deploy credentials
        id: guard
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "⏭️ No GCP_SA_KEY secret — skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        env:
          GCP_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Derive app config from repo name
        id: derive
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          SLUG="${REPO_NAME#iv-app-}"
          APP_API_URL="https://${REPO_NAME}-${{ vars.GCP_PROJECT_NUMBER }}.${{ vars.GCP_REGION }}.run.app"
          echo "app_slug=$SLUG" >> $GITHUB_OUTPUT
          echo "cloud_run_service=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "app_api_url=$APP_API_URL" >> $GITHUB_OUTPUT
          echo "📦 App slug: $SLUG"
          echo "🚀 Cloud Run service: $REPO_NAME"
          echo "🌐 App API URL: $APP_API_URL"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            frontend:
              - 'apps/desktop/**'
              - 'apps/mobile/**'
              - 'apps/admin/**'
            workers:
              - 'workers/**'
              - 'workers.yaml'

  # Deploy API to Cloud Run
  deploy-api:
    needs: setup
    if: needs.setup.outputs.api == 'true' && needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch DATABASE_URL from Neon
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          NEON_PROJECT_NAME="iv-app-${{ needs.setup.outputs.app_slug }}"
          echo "Looking up Neon project: $NEON_PROJECT_NAME"

          # Find the project by name
          PROJECT_ID=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects" | \
            python3 -c "import sys,json; projects=json.load(sys.stdin)['projects']; matches=[p for p in projects if p['name']=='$NEON_PROJECT_NAME']; print(matches[0]['id'] if matches else '')")

          if [ -z "$PROJECT_ID" ]; then
            echo "❌ Neon project '$NEON_PROJECT_NAME' not found"
            exit 1
          fi

          # Get connection URI
          DATABASE_URL=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$PROJECT_ID/connection_uri?role_name=neondb_owner&database_name=neondb" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['uri'])")

          echo "::add-mask::$DATABASE_URL"
          echo "database_url=$DATABASE_URL" >> $GITHUB_OUTPUT
          echo "✅ Got DATABASE_URL from Neon"

      - name: Generate APP_SERVICE_TOKEN
        id: token
        env:
          JWT_SECRET: ${{ secrets.PLATFORM_JWT_SECRET }}
        run: |
          # Generate a long-lived (10 year) service token for the app
          TOKEN=$(python3 -c "
          import json, hmac, hashlib, base64, time, os

          header = base64.urlsafe_b64encode(json.dumps({'alg':'HS256','typ':'JWT'}).encode()).rstrip(b'=').decode()
          payload_data = {
              'sub': 'app:${{ needs.setup.outputs.app_slug }}',
              'type': 'service',
              'slug': '${{ needs.setup.outputs.app_slug }}',
              'iat': int(time.time()),
              'exp': int(time.time()) + 315360000  # 10 years
          }
          payload = base64.urlsafe_b64encode(json.dumps(payload_data).encode()).rstrip(b'=').decode()
          sig_input = f'{header}.{payload}'.encode()
          sig = base64.urlsafe_b64encode(hmac.new(os.environ['JWT_SECRET'].encode(), sig_input, hashlib.sha256).digest()).rstrip(b'=').decode()
          print(f'{header}.{payload}.{sig}')
          ")
          echo "::add-mask::$TOKEN"
          echo "app_service_token=$TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Generated APP_SERVICE_TOKEN (10-year, type=service)"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ needs.setup.outputs.cloud_run_service }} \
            --source apps/api \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ steps.neon.outputs.database_url }}" \
            --set-env-vars "PLATFORM_JWT_SECRET=${{ secrets.PLATFORM_JWT_SECRET }}" \
            --set-env-vars "APP_SLUG=${{ needs.setup.outputs.app_slug }}" \
            --set-env-vars "APP_SERVICE_TOKEN=${{ steps.token.outputs.app_service_token }}" \
            --set-env-vars "CORE_API_URL=${{ vars.CORE_API_URL }}" \
            --min-instances 0 \
            --max-instances 5

  # Build and deploy frontend (desktop) to GCS
  deploy-frontend:
    needs: setup
    if: needs.setup.outputs.frontend == 'true' && needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install and build
        env:
          VITE_APP_API_URL: ${{ needs.setup.outputs.app_api_url }}
          VITE_CORE_API_URL: ${{ vars.CORE_API_URL }}
        run: |
          pnpm install
          for variant in desktop mobile admin; do
            if [ -d "apps/$variant" ]; then
              echo "Building @app/$variant..."
              pnpm --filter "@app/$variant" build || true
            fi
          done

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload frontends to GCS
        run: |
          for variant in desktop mobile admin; do
            DIST="apps/$variant/dist"
            if [ -d "$DIST" ]; then
              echo "Uploading $variant to gs://${{ vars.GCS_BUCKET }}/${{ needs.setup.outputs.app_slug }}/$variant"
              gcloud storage cp -r "$DIST/*" "gs://${{ vars.GCS_BUCKET }}/${{ needs.setup.outputs.app_slug }}/$variant/"
            fi
          done
          echo "✅ All frontends uploaded"

  # Deploy workers as Cloud Functions
  deploy-workers:
    needs: setup
    if: needs.setup.outputs.workers == 'true' && needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: pnpm install

      - name: Deploy workers
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

          WORKER_COUNT=$(yq '.workers | length' workers.yaml)
          if [ "$WORKER_COUNT" = "0" ] || [ "$WORKER_COUNT" = "null" ]; then
            echo "No workers defined in workers.yaml — skipping"
            exit 0
          fi

          APP_SLUG="${{ needs.setup.outputs.app_slug }}"
          for i in $(seq 0 $(($WORKER_COUNT - 1))); do
            NAME=$(yq ".workers[$i].name" workers.yaml)
            SCHEDULE=$(yq ".workers[$i].schedule" workers.yaml)
            HANDLER=$(yq ".workers[$i].handler" workers.yaml)
            TIMEOUT=$(yq ".workers[$i].timeout // \"60s\"" workers.yaml)
            MEMORY=$(yq ".workers[$i].memory // \"256Mi\"" workers.yaml)

            FUNC_NAME="${APP_SLUG}-${NAME}"
            echo "Deploying worker: ${FUNC_NAME}"

            npx esbuild "${HANDLER}" --bundle --platform=node --target=node20 --outfile="dist-workers/${NAME}/index.js"

            # Fetch DATABASE_URL from Neon
            NEON_PROJECT_NAME="iv-app-${APP_SLUG}"
            PROJECT_ID=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects" | \
              python3 -c "import sys,json; projects=json.load(sys.stdin)['projects']; matches=[p for p in projects if p['name']=='$NEON_PROJECT_NAME']; print(matches[0]['id'] if matches else '')")
            DATABASE_URL=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$PROJECT_ID/connection_uri?role_name=neondb_owner&database_name=neondb" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['uri'])")

            gcloud functions deploy "${FUNC_NAME}" \
              --gen2 \
              --runtime=nodejs20 \
              --trigger-http \
              --source="dist-workers/${NAME}" \
              --entry-point=handler \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --region=${{ vars.GCP_REGION }} \
              --memory="${MEMORY}" \
              --timeout="${TIMEOUT}" \
              --set-env-vars DATABASE_URL=$DATABASE_URL \
              --set-env-vars PLATFORM_JWT_SECRET=${{ secrets.PLATFORM_JWT_SECRET }} \
              --set-env-vars CORE_API_URL=${{ vars.CORE_API_URL }} \
              --no-allow-unauthenticated

            gcloud scheduler jobs update http "${FUNC_NAME}-schedule" \
              --location=${{ vars.GCP_REGION }} \
              --schedule="${SCHEDULE}" \
              --uri="$(gcloud functions describe ${FUNC_NAME} --gen2 --region=${{ vars.GCP_REGION }} --format='value(serviceConfig.uri)')" \
              --oidc-service-account-email="${{ secrets.GCP_SA_EMAIL }}" \
              2>/dev/null || \
            gcloud scheduler jobs create http "${FUNC_NAME}-schedule" \
              --location=${{ vars.GCP_REGION }} \
              --schedule="${SCHEDULE}" \
              --uri="$(gcloud functions describe ${FUNC_NAME} --gen2 --region=${{ vars.GCP_REGION }} --format='value(serviceConfig.uri)')" \
              --oidc-service-account-email="${{ secrets.GCP_SA_EMAIL }}"

            echo "✅ Worker ${NAME} deployed and scheduled"
          done
