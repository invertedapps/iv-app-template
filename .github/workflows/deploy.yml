name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Determine which components changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workers: ${{ steps.filter.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            frontend:
              - 'apps/desktop/**'
            workers:
              - 'workers/**'
              - 'workers.yaml'

  # Deploy API to Cloud Run
  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check for deploy credentials
        id: guard
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "⏭️ No GCP_SA_KEY secret — skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        env:
          GCP_KEY: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: google-github-actions/auth@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.guard.outputs.skip != 'true'

      - name: Deploy to Cloud Run
        if: steps.guard.outputs.skip != 'true'
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --source apps/api \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --set-env-vars PLATFORM_JWT_SECRET=${{ secrets.PLATFORM_JWT_SECRET }} \
            --set-env-vars APP_SLUG=${{ vars.APP_SLUG }} \
            --min-instances 0 \
            --max-instances 5

  # Build and deploy frontend to GCS
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check for deploy credentials
        id: guard
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "⏭️ No GCP_SA_KEY secret — skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        env:
          GCP_KEY: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with: { node-version: '20' }

      - name: Install and build
        if: steps.guard.outputs.skip != 'true'
        run: |
          pnpm install
          pnpm --filter @app/desktop build

      - uses: google-github-actions/auth@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/upload-cloud-storage@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          path: apps/desktop/dist
          destination: ${{ vars.GCS_BUCKET }}/${{ vars.APP_SLUG }}
          parent: false

  # Deploy workers as Cloud Functions
  deploy-workers:
    needs: changes
    if: needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check for deploy credentials
        id: guard
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "⏭️ No GCP_SA_KEY secret — skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        env:
          GCP_KEY: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: google-github-actions/auth@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.guard.outputs.skip != 'true'

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with: { node-version: '20' }

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install

      - name: Deploy workers
        if: steps.guard.outputs.skip != 'true'
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

          WORKER_COUNT=$(yq '.workers | length' workers.yaml)
          if [ "$WORKER_COUNT" = "0" ] || [ "$WORKER_COUNT" = "null" ]; then
            echo "No workers defined in workers.yaml — skipping"
            exit 0
          fi

          for i in $(seq 0 $(($WORKER_COUNT - 1))); do
            NAME=$(yq ".workers[$i].name" workers.yaml)
            SCHEDULE=$(yq ".workers[$i].schedule" workers.yaml)
            HANDLER=$(yq ".workers[$i].handler" workers.yaml)
            TIMEOUT=$(yq ".workers[$i].timeout // \"60s\"" workers.yaml)
            MEMORY=$(yq ".workers[$i].memory // \"256Mi\"" workers.yaml)

            FUNC_NAME="${{ vars.APP_SLUG }}-${NAME}"
            echo "Deploying worker: ${FUNC_NAME}"

            npx esbuild "${HANDLER}" --bundle --platform=node --target=node20 --outfile="dist-workers/${NAME}/index.js"

            gcloud functions deploy "${FUNC_NAME}" \
              --gen2 \
              --runtime=nodejs20 \
              --trigger-http \
              --source="dist-workers/${NAME}" \
              --entry-point=handler \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --region=${{ vars.GCP_REGION }} \
              --memory="${MEMORY}" \
              --timeout="${TIMEOUT}" \
              --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }} \
              --set-env-vars PLATFORM_JWT_SECRET=${{ secrets.PLATFORM_JWT_SECRET }} \
              --no-allow-unauthenticated

            gcloud scheduler jobs update http "${FUNC_NAME}-schedule" \
              --location=${{ vars.GCP_REGION }} \
              --schedule="${SCHEDULE}" \
              --uri="$(gcloud functions describe ${FUNC_NAME} --gen2 --region=${{ vars.GCP_REGION }} --format='value(serviceConfig.uri)')" \
              --oidc-service-account-email="${{ secrets.GCP_SA_EMAIL }}" \
              2>/dev/null || \
            gcloud scheduler jobs create http "${FUNC_NAME}-schedule" \
              --location=${{ vars.GCP_REGION }} \
              --schedule="${SCHEDULE}" \
              --uri="$(gcloud functions describe ${FUNC_NAME} --gen2 --region=${{ vars.GCP_REGION }} --format='value(serviceConfig.uri)')" \
              --oidc-service-account-email="${{ secrets.GCP_SA_EMAIL }}"

            echo "✅ Worker ${NAME} deployed and scheduled"
          done
